<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecionando...</title>
</head>
<body>
  <script>
    const cliente = "robson";
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

    if (isIOS) {
      window.location.href = "/ios/index.html?cliente=" + encodeURIComponent(cliente);
    } else {
      window.location.href = "/android/index.html?cliente=" + encodeURIComponent(cliente);
    }
  </script>
</body>
</html>
