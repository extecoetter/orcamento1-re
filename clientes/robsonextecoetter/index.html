<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Climatiza Orçamentos</title>

<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  background:#0b5ed7;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
}

.box{
  text-align:center;
}

.spinner{
  margin-top:20px;
  width:40px;
  height:40px;
  border:4px solid rgba(255,255,255,0.3);
  border-top:4px solid white;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}
</style>
</head>

<body>

<div class="box">
<h2>Climatiza Orçamentos</h2>
<p>Carregando aplicativo...</p>
<div class="spinner"></div>
</div>

<script>

const cliente = "robsonextecoetter";

function detectarIOS(){
  const ua = navigator.userAgent || navigator.vendor || window.opera;
  return /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
}

if(detectarIOS()){
  window.location.href = "/ios/index.html?cliente=" + cliente;
}else{
  window.location.href = "/android/index.html?cliente=" + cliente;
}

</script>

</body>
</html>
