    function formatCurrencyInputs(){
      const unitEl = document.getElementById("valorUnitario");
      const descEl = document.getElementById("descontoServico");
      [unitEl, descEl].forEach((el) => {
        if(!el) return;
        el.addEventListener("blur", () => {
          el.value = formatMoneyBR(parseMoneyBR(el.value));
        });
      });
    }
    formatCurrencyInputs();


    // ===== UX: Serviços prontos + Adicionar item (mobile/desktop) =====
    (function(){
      const selSrv = document.getElementById("servicoPronto");
      const btnApply = document.getElementById("btnAplicarServico");
      const btnAdd = document.getElementById("btnToggleAdd");
      const form = document.getElementById("addForm");

      function clearForm(){
        const descEl = document.getElementById("descricao");
        const qtdEl  = document.getElementById("quantidade");
        const unitEl = document.getElementById("valorUnitario");
        const desEl  = document.getElementById("descontoServico");
        if(descEl) descEl.value = "";
        if(qtdEl)  qtdEl.value  = "";
        if(unitEl) unitEl.value = "";
        if(desEl)  desEl.value  = "0,00";
      }

      function openForm(){
        if(!form) return;
        form.classList.add("open");
        try{ form.scrollIntoView({behavior:"smooth", block:"start"}); }catch(e){}
      }

      function syncApplyBtn(){
        if(!selSrv || !btnApply) return;
        const has = (selSrv.value && selSrv.value !== "0");
        btnApply.disabled = !has;
        btnApply.style.opacity = btnApply.disabled ? "0.6" : "1";
      }

      // Apply serviço -> preenche campos (editável)
      if(selSrv && btnApply){
        selSrv.addEventListener("change", syncApplyBtn);
        syncApplyBtn();

        btnApply.addEventListener("click", () => {
          const rawVal = selSrv.value || "0";
          if(rawVal === "0") return;

          // tenta achar no array (por nome/desc). Se não achar, usa o texto do select mesmo.
          let s = null;
          if(typeof SERVICOS_PRE !== "undefined" && Array.isArray(SERVICOS_PRE)){
            s = SERVICOS_PRE.find(x => (x?.nome === rawVal) || (x?.desc === rawVal)) || null;
          }

          const descEl = document.getElementById("descricao");
          const qtdEl  = document.getElementById("quantidade");
          const unitEl = document.getElementById("valorUnitario");
          const desEl  = document.getElementById("descontoServico");

          if(descEl) descEl.value = (s?.desc || s?.nome || rawVal).toString();
          if(qtdEl)  qtdEl.value  = String(s?.qtd ?? 1);
          if(unitEl) unitEl.value = formatMoneyBR(Number(s?.unit ?? 0));
          if(desEl)  desEl.value  = "0,00";

          openForm();
        });
      }

      // Botão "ADICIONAR ITEM" -> abre em branco
      if(btnAdd && form){
        function syncFormByViewport(){
          // Desktop sempre aberto; mobile começa fechado
          if(window.matchMedia("(max-width: 768px)").matches){
            form.classList.remove("open");
          }else{
            form.classList.add("open");
          }
        }
        syncFormByViewport();
        window.addEventListener("resize", syncFormByViewport);

        btnAdd.addEventListener("click", () => {
          // limpa e abre em branco
          clearForm();
          if(selSrv) { selSrv.value = "0"; syncApplyBtn(); }
          openForm();
          try{
            const first = document.getElementById("descricao") || document.getElementById("quantidade");
            first && first.focus();
          }catch(e){}
        });
      }
    })();

</script>

<script>
    // ✅ EDITE AQUI SUA LISTA DE SERVIÇOS PRONTOS
    // Você pode colocar quantos quiser.
    const SERVICOS_PRE = [
      { nome: "Selecione um serviço...", desc: "", unit: "", qtd: "" },

      { nome: "Higienização Split 9.000 a 12.000 BTUs", desc: "Higienização de ar-condicionado Split (9.000 a 12.000 BTUs)", unit: 180.00, qtd: 1 },
      { nome: "Higienização Split 18.000 a 24.000 BTUs", desc: "Higienização de ar-condicionado Split (18.000 a 24.000 BTUs)", unit: 200.00, qtd: 1 },

      { nome: "Carga de gás (visita + diagnóstico)", desc: "Visita técnica + diagnóstico para carga de gás", unit: 80.00, qtd: 1 },

      { nome: "Instalação Split até 12.000 BTUs", desc: "Instalação de ar-condicionado Split até 12.000 BTUs", unit: 650.00, qtd: 1 },
      { nome: "Instalação Split 18.000 a 24.000 BTUs", desc: "Instalação de ar-condicionado Split (18.000 a 24.000 BTUs)", unit: 850.00, qtd: 1 }

      { nome: "Instalação Multi-Split (por evaporadora)", desc: "Instalação Multi-Split (por evaporadora)", qtd: 1, unit: 0 },
      { nome: "Desinstalação de Equipamento", desc: "Desinstalação de Equipamento", qtd: 1, unit: 0 },
      { nome: "Limpeza Química (desmontagem e lavagem)", desc: "Limpeza Química (desmontagem e lavagem)", qtd: 1, unit: 0 },
      { nome: "Carga de Gás", desc: "Carga de Gás", qtd: 1, unit: 0 },
      { nome: "Troca de Componente eletrônico", desc: "Troca de Componente eletrônico", qtd: 1, unit: 0 },
      { nome: "Teste de Estanquidade", desc: "Teste de Estanquidade", qtd: 1, unit: 0 },
      { nome: "Vácuo no Sistema", desc: "Vácuo no Sistema", qtd: 1, unit: 0 },
      { nome: "Visita Técnica / Diagnóstico", desc: "Visita Técnica / Diagnóstico", qtd: 1, unit: 0 },
      { nome: "Infra Estrutura", desc: "Infra Estrutura", qtd: 1, unit: 0 },
      { nome: "Instalação/Manutenção Bomba de Dreno", desc: "Instalação/Manutenção Bomba de Dreno", qtd: 1, unit: 0 },
    ];

    let totalGeral = 0;
    let lastPdfBlob = null;
    let lastPdfFilename = "Orcamento.pdf";

    function recalcularTotal(){
      totalGeral = 0;
      document.querySelectorAll("#tabela tbody tr").forEach(tr => {
        totalGeral += parseFloat(tr.cells[5].innerText) || 0;
      });
      document.getElementById("total").innerText = totalGeral.toFixed(2);
    }

    
    // ===== Mobile cards (sem quebrar a tabela do desktop) =====
    function fmtBR(v){
      try{
        return Number(v || 0).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }catch(e){
        return (Number(v||0).toFixed(2)).replace(".", ",");
      }

    function parseMoneyBR(v){
      if(v === null || v === undefined) return 0;
      const s = String(v).replace(/[^\d,.-]/g, "").replace(/\./g,"").replace(",",".");
      const n = parseFloat(s);
      return isNaN(n) ? 0 : n;
    }
    function formatMoneyBR(n){
      try{
        return (Number(n)||0).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }catch(e){
        return "0,00";
      }
    }

    }

    function getRowNumbers(row){
      const qtd = parseFloat(row.cells[1].innerText) || 0;
      const unit = parseFloat(row.cells[2].innerText) || 0;
      const desc = parseFloat(row.cells[4].innerText) || 0;
      return { qtd, unit, desc };
    }

    function atualizarLinha(row, qtd, unit, desc){
      const total = (qtd || 0) * (unit || 0);
      const liquido = total - (desc || 0);
      row.cells[1].innerText = qtd;
      row.cells[2].innerText = (unit || 0).toFixed(2);
      row.cells[3].innerText = total.toFixed(2);
      row.cells[4].innerText = (desc || 0).toFixed(2);
      row.cells[5].innerText = liquido.toFixed(2);
      recalcularTotal();
      renderItensCards();
    }

    
    function renderItensCards(){
      const wrap = document.getElementById("itensCards");
      if(!wrap) return;

      const rows = Array.from(document.querySelectorAll("#tabela tbody tr"));
      wrap.innerHTML = "";

      rows.forEach((row) => {
        const { qtd, unit, desc } = getRowNumbers(row);
        const descTxt = row.cells[0].innerText || "";

        const card = document.createElement("div");
        card.className = "item-card";

        // Top row: select + trash
        const top = document.createElement("div");
        top.className = "top";

        const sel = document.createElement("select");
        sel.className = "item-select";
        // option personalizado
        const optCustom = document.createElement("option");
        optCustom.value = "-1";
        optCustom.textContent = descTxt || "Item";
        sel.appendChild(optCustom);

        // serviços prontos
        SERVICOS_PRE.forEach((s, idx) => {
          if(idx === 0) return;
          const opt = document.createElement("option");
          opt.value = String(idx);
          opt.textContent = s.nome;
          // tenta casar por texto
          if(descTxt && (descTxt.includes(s.nome) || descTxt === s.desc)) opt.selected = true;
          sel.appendChild(opt);
        });

        const del = document.createElement("button");
        del.type = "button";
        del.className = "icon-btn";
        del.setAttribute("aria-label", "Remover item");
        del.innerHTML = "🗑️";
        del.addEventListener("click", () => {
          row.remove();
          recalcularTotal();
          renderItensCards();
        });

        top.appendChild(sel);
        top.appendChild(del);

        // Row 2: money + stepper
        const row2 = document.createElement("div");
        row2.className = "row2";

        const money = document.createElement("div");
        money.className = "money-input";

        const prefix = document.createElement("span");
        prefix.className = "prefix";
        prefix.textContent = "R$";

        const moneyInput = document.createElement("input");
        moneyInput.type = "text";
        moneyInput.inputMode = "decimal";
        moneyInput.value = fmtBR(unit);
        moneyInput.addEventListener("change", () => {
          const v = parseFloat(String(moneyInput.value).replace(/\./g,"").replace(",", "."));
          const nums = getRowNumbers(row);
          atualizarLinha(row, nums.qtd, isNaN(v)?0:v, nums.desc);
        });

        money.appendChild(prefix);
        money.appendChild(moneyInput);

        const step = document.createElement("div");
        step.className = "qty-stepper";

        const btnMinus = document.createElement("button");
        btnMinus.type = "button";
        btnMinus.textContent = "−";
        btnMinus.addEventListener("click", () => {
          const nums = getRowNumbers(row);
          const next = Math.max(1, nums.qtd - 1);
          atualizarLinha(row, next, nums.unit, nums.desc);
        });

        const mid = document.createElement("span");
        mid.textContent = String(qtd);

        const btnPlus = document.createElement("button");
        btnPlus.type = "button";
        btnPlus.textContent = "+";
        btnPlus.addEventListener("click", () => {
          const nums = getRowNumbers(row);
          const next = nums.qtd + 1;
          atualizarLinha(row, next, nums.unit, nums.desc);
        });

        step.appendChild(btnMinus);
        step.appendChild(mid);
        step.appendChild(btnPlus);

        row2.appendChild(money);
        row2.appendChild(step);

        // Meta line
        const meta = document.createElement("div");
        meta.className = "meta";

        function refreshMeta(){
          const nums = getRowNumbers(row);
          meta.innerHTML = `<span>Total: <b>R$ ${fmtBR(row.cells[3].innerText)}</b></span>
                            <span>Desc: <b>R$ ${fmtBR(nums.desc)}</b></span>
                            <span>Líquido: <b>R$ ${fmtBR(row.cells[5].innerText)}</b></span>`;
          mid.textContent = String(nums.qtd);
          moneyInput.value = fmtBR(nums.unit);
        }
        refreshMeta();

        // Change select: apply serviço pronto
        sel.addEventListener("change", () => {
          const idx = parseInt(sel.value, 10);
          if(isNaN(idx) || idx < 1) return;
          const s = SERVICOS_PRE[idx];
          if(!s) return;
          row.cells[0].innerText = s.desc || s.nome;
          row.cells[0].className = "desc";
          const nums = getRowNumbers(row);
          const nextQtd = nums.qtd || (s.qtd ?? 1);
          atualizarLinha(row, nextQtd, Number(s.unit||0), nums.desc);
        });

        // Observe changes in the row to keep card synced
        const obs = new MutationObserver(refreshMeta);
        obs.observe(row, { childList:true, subtree:true, characterData:true });

        card.appendChild(top);
        card.appendChild(row2);
        card.appendChild(meta);

        wrap.appendChild(card);
      });
    }


function loadImageAsDataURL(src){
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = function(){
          const canvas = document.createElement("canvas");
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0);
          try{ resolve(canvas.toDataURL("image/png")); }
          catch(err){ reject(err); }
        };
        img.onerror = reject;
        img.src = src;
      });
    }

    // ✅ Monta o select de serviços prontos
    function popularServicosProntos(){
      const sel = document.getElementById("servicoPronto");
      if(!sel) return;
      try{
        sel.innerHTML = "";
        SERVICOS_PRE.forEach((s, idx) => {
        const opt = document.createElement("option");
        opt.value = String(idx);
        opt.textContent = s.nome;
        sel.appendChild(opt);
      });
      }catch(e){ /* fallback: mantém opções estáticas */ }
    }

    // ✅ Aplica serviço selecionado (preenche os campos)
    function aplicarServicoSelecionado(){
      const sel = document.getElementById("servicoPronto");
      const idx = parseInt(sel.value, 10);
      const s = SERVICOS_PRE[idx];
      if(!s || !s.desc) return;

      document.getElementById("descricao").value = s.desc;
      document.getElementById("valorUnitario").value = (s.unit ?? "");
      document.getElementById("quantidade").value = (s.qtd ?? 1);

      // opcional: zera desconto ao escolher serviço pronto
      document.getElementById("descontoServico").value = "0,00";
    }

    // inicializa select
    popularServicosProntos();

    

    
document.getElementById("btnAplicarServico").addEventListener("click", aplicarServicoSelecionado);

    // bônus: ao trocar o select, já aplica automaticamente
    document.getElementById("servicoPronto").addEventListener("change", aplicarServicoSelecionado);

    // adicionar serviço
    document.getElementById("btnAddServico").addEventListener("click", function(){
      const desc = document.getElementById("descricao").value.trim();
      const qtd = parseFloat(document.getElementById("quantidade").value);
      const unit = parseMoneyBR(document.getElementById("valorUnitario").value);
      const desconto = parseMoneyBR(document.getElementById("descontoServico").value) || 0;

      if(!desc || isNaN(qtd) || isNaN(unit)) return;

      const total = qtd * unit;
      const liquido = total - desconto;

      const tbody = document.querySelector("#tabela tbody");
      const row = tbody.insertRow();

      row.insertCell(0).innerText = desc;
      row.cells[0].className = "desc";
      row.insertCell(1).innerText = qtd;
      row.insertCell(2).innerText = unit.toFixed(2);
      row.insertCell(3).innerText = total.toFixed(2);
      row.insertCell(4).innerText = desconto.toFixed(2);
      row.insertCell(5).innerText = liquido.toFixed(2);

      const actionCell = row.insertCell(6);
      const btn = document.createElement("button");
      btn.className = "btn-remove";
      btn.type = "button";
      btn.innerText = "Remover";
      btn.addEventListener("click", () => { row.remove(); recalcularTotal(); renderItensCards(); });
      actionCell.appendChild(btn);

      recalcularTotal();
      renderItensCards();

      document.getElementById("descricao").value = "";
      document.getElementById("quantidade").value = "";
      document.getElementById("valorUnitario").value = "";
      document.getElementById("descontoServico").value = "0,00";
    });

    // Mobile: botão "ADICIONAR ITEM" abre/fecha o formulário
    
// compartilhar
    document.getElementById("btnShare").addEventListener("click", async function(){
      if(!lastPdfBlob){
        alert("Gere o PDF antes de compartilhar.");
        return;
      }
      const file = new File([lastPdfBlob], lastPdfFilename, { type: "application/pdf" });

      if(navigator.share && navigator.canShare && navigator.canShare({ files: [file] })){
        try{
          await navigator.share({ title: "Orçamento Proposta Comercial", text: "Segue o orçamento em PDF.", files: [file] });
        }catch(e){}
      }else{
        alert("Seu navegador não suporta compartilhar arquivo direto. Use o botão 'Abrir WhatsApp (mensagem)' e anexe o PDF manualmente.");
      }
    });

    document.getElementById("btnWhatsAppFallback").addEventListener("click", function(){
      const cliente = document.getElementById("cliente").value || "Cliente";
      const msg = encodeURIComponent(`Olá, ${cliente}! Segue o orçamento em PDF. (Anexo)`);
      window.open(`https://wa.me/?text=${msg}`, "_blank");
    });

    // gerar PDF (mantém seu layout atual)
    document.getElementById("btnGerarPDF").addEventListener("click", async function() {
      if(totalGeral === 0){
        alert("Adicione pelo menos um serviço.");
        return;
      }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      const pageW = doc.internal.pageSize.getWidth();
      const margin = 15;
      const centerX = pageW / 2;

      const cliente = document.getElementById("cliente").value;
      const telefone = document.getElementById("telefoneCliente").value;
      const endereco = document.getElementById("enderecoCliente").value;
      const pagamento = document.getElementById("pagamento").value;
      const obs = document.getElementById("observacoes").value;
      const data = new Date().toLocaleDateString();

      const lineBlue = [210, 225, 245];
      const boxBlue  = [248, 252, 255];

      let logoDataUrl = null;
      try{ logoDataUrl = await loadImageAsDataURL("logo.png"); }catch(e){ logoDataUrl = null; }

      // Cabeçalho (logo + proposta + linha)
      if(logoDataUrl){
        doc.addImage(logoDataUrl, "PNG", 15, 8, 100, 40);
      }

      const lineY = 52;
      const propostaY = 49;

      doc.setFont("helvetica","bold");
      doc.setFontSize(13);
      doc.setTextColor(0,0,0);
      doc.text("Proposta Comercial", centerX, propostaY, { align: "center" });

      doc.setDrawColor(...lineBlue);
      doc.setLineWidth(1);
      doc.line(margin, lineY, pageW - margin, lineY);

      // Quadro cliente
      let y = 65;
      doc.setFillColor(...boxBlue);
      doc.roundedRect(12, y-7, pageW - 24, 22, 3, 3, "F");

      doc.setFont("helvetica","bold");
      doc.setFontSize(11);
      doc.setTextColor(0,0,0);
      doc.text("Cliente:", margin, y);

      doc.setFont("helvetica","normal");
      doc.text(cliente || "-", margin + 25, y);

      y += 7;
      doc.setTextColor(90,90,90);
      doc.text("Telefone: " + (telefone || "-"), margin, y);

      y += 7;
      doc.text("Endereço: " + (endereco || "-"), margin, y);

      y += 12;

      // tabela
      const body = Array.from(document.querySelectorAll("#tabela tbody tr")).map(tr =>
        Array.from(tr.querySelectorAll("td")).slice(0,6).map(td => td.innerText)
      );

      doc.autoTable({
        startY: y,
        head: [['Descrição','Qtd','Unit','Total','Desc','Líquido']],
        body,
        theme: 'plain',
        styles: { fontSize: 10, cellPadding: 3 },
        didDrawCell: function(data) {
          if (data.section === 'head' || data.section === 'body') {
            doc.setDrawColor(210,210,210);
            doc.setLineWidth(0.5);
            doc.line(data.cell.x, data.cell.y + data.cell.height, data.cell.x + data.cell.width, data.cell.y + data.cell.height);
          }
        },
        columnStyles: {
          1: { halign: 'right' },
          2: { halign: 'right' },
          3: { halign: 'right' },
          4: { halign: 'right' },
          5: { halign: 'right' }
        }
      });

      y = doc.lastAutoTable.finalY + 10;

      doc.setFont("helvetica","bold");
      doc.setFontSize(14);
      doc.setTextColor(0,0,0);
      doc.text("Total Geral: R$ " + totalGeral.toFixed(2), pageW - margin, y, { align: 'right' });
      y += 10;

      doc.setFont("helvetica","bold");
      doc.setFontSize(11);
      doc.setTextColor(0,0,0);

      const label = "Forma de Pagamento:";
      const labelX = margin;
      doc.text(label, labelX, y);

      const labelW = doc.getTextWidth(label);
      const valueX = labelX + labelW + 4;

      doc.setFont("helvetica","normal");
      doc.setTextColor(90,90,90);
      doc.text(pagamento || "-", valueX, y);
      y += 12;

      if(obs){
        doc.setFont("helvetica","bold");
        doc.setTextColor(0,0,0);
        doc.text("Observações:", margin, y);
        y += 6;

        doc.setFont("helvetica","normal");
        doc.setTextColor(90,90,90);
        const linhas = doc.splitTextToSize(obs, pageW - (margin * 2));
        doc.text(linhas, margin, y);
        y += (linhas.length * 5) + 10;
      }else{
        y += 6;
      }

      doc.setFont("helvetica","normal");
      doc.setFontSize(10);
      doc.setTextColor(90,90,90);
      doc.text("Data: " + data, margin, y);
      y += 18;

      doc.setDrawColor(160,160,160);
      lastPdfFilename = "Orcamento_" + ((cliente || "Cliente").replace(/[\\/:*?"<>|]/g, "")) + ".pdf";
      lastPdfBlob = doc.output("blob");

      doc.save(lastPdfFilename);
      document.getElementById("shareArea").style.display = "block";
    });

    // PWA: registra service worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  

    window.addEventListener('load', () => { try{ renderItensCards(); }catch(e){} });
</script>

<script>
/* ===== HOTFIX: Serviços prontos + Adicionar Item (override) ===== */
(function(){
  const selSrv = document.getElementById("servicoPronto");
  const btnApply = document.getElementById("btnAplicarServico");
  const btnAdd = document.getElementById("btnToggleAdd");
  const form = document.getElementById("addForm");

  function parseMoneyBR(v){
    if(v === null || v === undefined) return 0;
    const s = String(v).replace(/[^\d,.-]/g,"").replace(/\./g,"").replace(",",".");
    const n = parseFloat(s);
    return isNaN(n) ? 0 : n;
  }
  function formatMoneyBR(n){
    try{ return (Number(n)||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}); }
    catch(e){ return "0,00"; }
  }

  function clearForm(){
    const descEl = document.getElementById("descricao");
    const qtdEl  = document.getElementById("quantidade");
    const unitEl = document.getElementById("valorUnitario");
    const desEl  = document.getElementById("descontoServico");
    if(descEl) descEl.value = "";
    if(qtdEl)  qtdEl.value  = "";
    if(unitEl) unitEl.value = "";
    if(desEl)  desEl.value  = "0,00";
  }

  function openForm(){
    if(!form) return;
    form.classList.add("open");
    try{ form.scrollIntoView({behavior:"smooth", block:"start"}); }catch(e){}
  }

  function syncApplyBtn(){
    if(!selSrv || !btnApply) return;
    const ok = !!(selSrv.value && selSrv.value !== "0");
    btnApply.disabled = !ok;
    btnApply.style.opacity = btnApply.disabled ? "0.6" : "1";
  }

  // Override handlers
  if(selSrv && btnApply){
    selSrv.onchange = syncApplyBtn;
    syncApplyBtn();

    btnApply.onclick = function(){
      const rawVal = selSrv.value || "0";
      if(rawVal === "0") return;

      let s = null;
      if(typeof SERVICOS_PRE !== "undefined" && Array.isArray(SERVICOS_PRE)){
        s = SERVICOS_PRE.find(x => (x && (x.nome === rawVal || x.desc === rawVal))) || null;
      }

      const descEl = document.getElementById("descricao");
      const qtdEl  = document.getElementById("quantidade");
      const unitEl = document.getElementById("valorUnitario");
      const desEl  = document.getElementById("descontoServico");

      if(descEl) descEl.value = (s?.desc || s?.nome || rawVal).toString();
      if(qtdEl)  qtdEl.value  = String(s?.qtd ?? 1);
      if(unitEl) unitEl.value = formatMoneyBR(Number(s?.unit ?? 0));
      if(desEl)  desEl.value  = "0,00";

      openForm();
    };
  }

  if(btnAdd){
    btnAdd.onclick = function(){
      clearForm();
      if(selSrv){ selSrv.value = "0"; syncApplyBtn(); }
      openForm();
      try{ (document.getElementById("descricao")||document.getElementById("quantidade"))?.focus(); }catch(e){}
    };
  }

  // Format currency on blur
  const unitEl = document.getElementById("valorUnitario");
  const desEl  = document.getElementById("descontoServico");
  [unitEl, desEl].forEach(el=>{
    if(!el) return;
    el.addEventListener("blur", ()=>{ el.value = formatMoneyBR(parseMoneyBR(el.value)); });
  });
})();
</script>
